bundle:
  name: us-grocery-demand-inventory-databricks

workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

resources:
  jobs:
    grocery_demand_inventory_pipeline:
      name: us-grocery-demand-inventory-pipeline
      max_concurrent_runs: 1
      tasks:
        - task_key: validate_s3_access
          notebook_task:
            notebook_path: ./notebooks/00_validate_s3_access.py

        - task_key: raw_row_counts
          depends_on:
            - task_key: validate_s3_access
          notebook_task:
            notebook_path: ./notebooks/01_raw_row_counts.py

        - task_key: setup_schemas
          depends_on:
            - task_key: raw_row_counts
          notebook_task:
            notebook_path: ./notebooks/02_setup_schemas.py

        - task_key: bronze_instacart_ingestion
          depends_on:
            - task_key: setup_schemas
          notebook_task:
            notebook_path: ./notebooks/03_bronze_instacart_ingestion.py

        - task_key: silver_dimensions
          depends_on:
            - task_key: bronze_instacart_ingestion
          notebook_task:
            notebook_path: ./notebooks/04_silver_dimensions.py

        - task_key: silver_product_ai_classification
          depends_on:
            - task_key: silver_dimensions
          notebook_task:
            notebook_path: ./notebooks/04_silver_product_ai_classification.py

        - task_key: silver_fact_order_products
          depends_on:
            - task_key: silver_product_ai_classification
          notebook_task:
            notebook_path: ./notebooks/05_silver_fact_order_products.py

        - task_key: gold_demand_metrics
          depends_on:
            - task_key: silver_fact_order_products
          notebook_task:
            notebook_path: ./notebooks/06_gold_demand_metrics.py

        - task_key: gold_reorder_metrics
          depends_on:
            - task_key: gold_demand_metrics
          notebook_task:
            notebook_path: ./notebooks/07_gold_reorder_metrics.py

        - task_key: gold_ai_demand_segments
          depends_on:
            - task_key: gold_reorder_metrics
          notebook_task:
            notebook_path: ./notebooks/08_gold_ai_demand_segments.py

        - task_key: generate_inventory_snapshots
          depends_on:
            - task_key: gold_ai_demand_segments
          notebook_task:
            notebook_path: ./notebooks/09_generate_inventory_snapshots.py

        - task_key: gold_stockout_risk
          depends_on:
            - task_key: generate_inventory_snapshots
          notebook_task:
            notebook_path: ./notebooks/10_gold_stockout_risk.py

        - task_key: gold_overstock_alerts
          depends_on:
            - task_key: gold_stockout_risk
          notebook_task:
            notebook_path: ./notebooks/11_gold_overstock_alerts.py

        - task_key: gold_basket_affinity
          depends_on:
            - task_key: gold_overstock_alerts
          notebook_task:
            notebook_path: ./notebooks/12_gold_basket_affinity.py

targets:
  dev:
    mode: development
    default: true
