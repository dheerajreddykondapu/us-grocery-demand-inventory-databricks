name: CI - Validate Grocery Databricks Pipeline

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Lambda, notebooks, SQL, and bundle config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python files
        run: |
          python -m compileall lambda notebooks

      - name: Check required project files exist
        run: |
          required_files=(
            "lambda/lambda_function.py"
            "requirements.txt"
            "sql/dashboard_queries.sql"
            "databricks.yml"
            "notebooks/00_setup.py"
            "notebooks/01_validate_s3_raw_files.py"
            "notebooks/02_bronze_instacart_ingestion.py"
            "notebooks/03_silver_dimensions.py"
            "notebooks/04_silver_product_ai_classification.py"
            "notebooks/05_silver_fact_order_products.py"
            "notebooks/06_gold_demand_metrics.py"
            "notebooks/07_gold_reorder_metrics.py"
            "notebooks/08_generate_inventory_snapshots.py"
            "notebooks/09_gold_stockout_risk.py"
            "notebooks/10_gold_overstock_alerts.py"
            "notebooks/11_gold_basket_affinity.py"
            "notebooks/12_final_validation.py"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

      - name: Print validated pipeline assets
        run: |
          echo "Validated assets:"
          find lambda notebooks sql config -type f | sort
